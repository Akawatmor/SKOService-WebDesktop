<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="90" fill="#0a0a0a"/>
  <circle cx="256" cy="256" r="180" fill="none" stroke="#0078d4" stroke-width="8"/>
  <circle cx="256" cy="256" r="170" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <!-- Hour marks -->
  <g stroke="rgba(255,255,255,0.8)" stroke-width="4" stroke-linecap="round">
    <line x1="256" y1="86" x2="256" y2="106"/>
    <line x1="341" y1="107" x2="331" y2="125" transform="rotate(30 256 256)"/>
    <line x1="341" y1="107" x2="331" y2="125" transform="rotate(60 256 256)"/>
    <line x1="426" y1="256" x2="406" y2="256"/>
    <line x1="341" y1="107" x2="331" y2="125" transform="rotate(120 256 256)"/>
    <line x1="341" y1="107" x2="331" y2="125" transform="rotate(150 256 256)"/>
    <line x1="256" y1="426" x2="256" y2="406"/>
    <line x1="341" y1="107" x2="331" y2="125" transform="rotate(210 256 256)"/>
    <line x1="341" y1="107" x2="331" y2="125" transform="rotate(240 256 256)"/>
    <line x1="86" y1="256" x2="106" y2="256"/>
    <line x1="341" y1="107" x2="331" y2="125" transform="rotate(300 256 256)"/>
    <line x1="341" y1="107" x2="331" y2="125" transform="rotate(330 256 256)"/>
  </g>
  <!-- Hour hand -->
  <line x1="256" y1="270" x2="256" y2="150" stroke="white" stroke-width="8" stroke-linecap="round" transform="rotate(-30 256 256)"/>
  <!-- Minute hand -->
  <line x1="256" y1="275" x2="256" y2="110" stroke="white" stroke-width="5" stroke-linecap="round" transform="rotate(60 256 256)"/>
  <!-- Second hand -->
  <line x1="256" y1="290" x2="256" y2="100" stroke="#e81123" stroke-width="2" stroke-linecap="round" transform="rotate(120 256 256)"/>
  <!-- Center -->
  <circle cx="256" cy="256" r="8" fill="#0078d4"/>
  <circle cx="256" cy="256" r="4" fill="white"/>
</svg>
